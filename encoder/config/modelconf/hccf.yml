optimizer:
  name: adam
  lr: 1.0e-3
  weight_decay: 0

train:
  epoch: 3000
  batch_size: 4096
  save_model: false
  loss: pairwise
  test_step: 3
  reproducible: true
  seed: 2023
  patience: 5

test:
  metrics: [recall, ndcg]
  k: [5, 10, 20]
  batch_size: 1024

data:
  type: general_cf
  name: amazon

model:
  name: hccf
  embedding_size: 32
  hyper_num: 128
  layer_num: 2
  keep_rate: 0.5
  reg_weight: 1.0e-5
  cl_weight: 1.0e-4
  temperature: 1.0

  amazon:
    layer_num: 2
    keep_rate: 0.5
    reg_weight: 1.0e-2
    cl_weight: 1.0e-7
    temperature: 0.1
  yelp:
    layer_num: 2
    keep_rate: 0.5
    reg_weight: 1.0e-5
    cl_weight: 1.0e-4
    temperature: 1.0
  steam:
    layer_num: 2
    keep_rate: 0.5
    reg_weight: 1.0e-5
    cl_weight: 1.0e-4
    temperature: 1.0
  movie:
    layer_num: 2
    keep_rate: 1.0
    reg_weight: 1.0e-3
    cl_weight: 1.0e-6
    temperature: 0.1
